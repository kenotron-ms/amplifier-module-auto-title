bundle:
  name: terminal-title-behavior
  version: 2.0.0
  description: >
    Watches the session name and updates the terminal window title automatically.
    Hooks into prompt:complete (after hooks-session-naming) to reuse the name
    already computed — no extra LLM call required. Designed to be composed into
    any bundle.

hooks:
  - module: hooks-auto-title
    source: git+https://github.com/kenotron-ms/amplifier-module-auto-title@main#subdirectory=modules/hooks-auto-title
